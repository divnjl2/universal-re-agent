name: CI

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master", "develop"]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install "ruff>=0.3"

      - name: Run ruff check
        run: ruff check src/ tests/

      - name: Run ruff format check
        run: ruff format --check src/ tests/

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install \
            "mypy>=1.8" \
            "anthropic>=0.40.0" \
            "httpx>=0.27" \
            "pydantic>=2.0" \
            "pyyaml>=6.0"

      - name: Run mypy
        run: mypy src/ --ignore-missing-imports --no-strict-optional

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install \
            "pytest>=8.0" \
            "pytest-asyncio>=0.23" \
            "pytest-cov>=5.0" \
            "anthropic>=0.40.0" \
            "httpx>=0.27" \
            "pydantic>=2.0" \
            "pyyaml>=6.0" \
            "rich>=13.0" \
            "click>=8.1"
          # Optional deps — install if available
          pip install lief pefile || true
          pip install chromadb sentence-transformers || true
          pip install ollama || true

      - name: Run pytest
        env:
          # Provide a dummy key so imports that check for it don't fail
          ANTHROPIC_API_KEY: "sk-test-dummy-key-for-ci"
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            -x

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
