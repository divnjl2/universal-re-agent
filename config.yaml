# Universal RE Agent — Configuration
# Copy .env.example to .env and set ANTHROPIC_API_KEY or OPENAI_API_KEY

models:
  # Tier 1 — local workers (80% of tasks: simple naming, typing, explanation)
  tier1:
    provider: openai
    model: "worker-4b"             # qwen3:4b via NEXUS LiteLLM
    base_url: "http://192.168.1.136:4000/v1"
    api_key: "sk-nexus-litellm-2026"
    complexity_threshold: 0.35

  # Tier 2 — local orchestrators (15% of tasks: complex reasoning, CFG)
  tier2:
    provider: openai
    model: "coder-30b"             # Qwen3-Coder-30B via NEXUS LiteLLM
    base_url: "http://192.168.1.136:4000/v1"
    api_key: "sk-nexus-litellm-2026"
    complexity_threshold: 0.80

  # Tier 3 — cloud escalation (5% of tasks: obfuscation, novel patterns)
  tier3:
    provider: openai
    model: "cloud-sonnet"          # Claude Sonnet 4.6 via cliproxy
    base_url: "http://192.168.1.136:4000/v1"
    api_key: "sk-nexus-litellm-2026"
    max_tokens: 8192

mcp:
  ghidra:
    enabled: true
    host: "localhost"
    port: 8765
    timeout: 30
  frida:
    enabled: true
    host: "localhost"
    port: 8766
    timeout: 60
    # Start the server with: python frida_mcp_server.py [port]
    # Server script: src/mcp/frida_mcp_server.py
    # Protocol: JSON-RPC 2.0 over POST /rpc
    # Health check: GET http://localhost:8766/health
    # frida CLI (pip install frida-tools) required for attach/spawn/stalker/scan;
    # generate_hook works without it (pure JS template generation)

knowledge:
  vector_store:
    provider: chromadb
    persist_dir: "./data/chroma"
    collection: "re_functions"
    embedding_model: "all-MiniLM-L6-v2"
  signature_db:
    path: "./data/signatures"
  rlhf_db:
    path: "./data/rlhf"

analysis:
  max_functions_per_session: 500
  parallel_workers: 3
  context_window_budget: 8000    # tokens per function analysis
  chain_of_evidence: true        # log every finding with evidence

logging:
  level: "INFO"
  rich_traceback: true
