# Universal RE Agent — Configuration
# Copy .env.example to .env and set ANTHROPIC_API_KEY or OPENAI_API_KEY

models:
  # Tier 1 — local workers (80% of tasks: simple naming, typing, explanation)
  tier1:
    provider: openai
    model: "qwen2.5-coder:7b"      # Your Nexus model
    base_url: "http://localhost:8000/v1"
    complexity_threshold: 0.35     # below this → tier1

  # Tier 2 — local orchestrators (15% of tasks: complex reasoning, CFG)
  tier2:
    provider: openai
    model: "deepseek-coder-v2"     # Your Nexus model
    base_url: "http://localhost:8000/v1"
    complexity_threshold: 0.80     # below this → tier2

  # Tier 3 — cloud escalation / cluster head (5% of tasks)
  tier3:
    provider: openai
    model: "qwen-3-30b"            # Your Nexus cluster head
    base_url: "http://localhost:8000/v1"
    max_tokens: 8192

mcp:
  ghidra:
    enabled: true
    host: "localhost"
    port: 8765
    timeout: 30
  frida:
    enabled: true
    host: "localhost"
    port: 8766
    timeout: 60

knowledge:
  vector_store:
    provider: chromadb
    persist_dir: "./data/chroma"
    collection: "re_functions"
    embedding_model: "all-MiniLM-L6-v2"
  signature_db:
    path: "./data/signatures"
  rlhf_db:
    path: "./data/rlhf"

analysis:
  max_functions_per_session: 500
  parallel_workers: 3
  context_window_budget: 8000    # tokens per function analysis
  chain_of_evidence: true        # log every finding with evidence

logging:
  level: "INFO"
  rich_traceback: true
